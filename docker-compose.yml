services:
  echo:
    build: .
    ports:
      - "8095:8095"
    volumes:
      - echo-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8095/api/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.echo-https.rule=Host(`echo.hovio.com.br`)"
      - "traefik.http.routers.echo-https.entrypoints=https"
      - "traefik.http.routers.echo-https.tls=true"
      - "traefik.http.routers.echo-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.echo.loadbalancer.server.port=8095"
      - "traefik.http.routers.echo-http.rule=Host(`echo.hovio.com.br`)"
      - "traefik.http.routers.echo-http.entrypoints=http"
    networks:
      - coolify

volumes:
  echo-data:

networks:
  coolify:
    external: true
