<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo — Entrar</title>
    <style>
        @font-face { font-family: "SF Pro Display"; src: url("/static/fonts/SF-Pro-Display-Regular.woff2") format("woff2"); font-weight: 400; font-display: swap; }
        @font-face { font-family: "SF Pro Display"; src: url("/static/fonts/SF-Pro-Display-Medium.woff2") format("woff2"); font-weight: 500; font-display: swap; }
        @font-face { font-family: "SF Pro Display"; src: url("/static/fonts/SF-Pro-Display-Semibold.woff2") format("woff2"); font-weight: 600; font-display: swap; }
        @font-face { font-family: "SF Pro Display"; src: url("/static/fonts/SF-Pro-Display-Bold.woff2") format("woff2"); font-weight: 700; font-display: swap; }
        @font-face { font-family: "SF Pro Text"; src: url("/static/fonts/SF-Pro-Text-Regular.woff2") format("woff2"); font-weight: 400; font-display: swap; }
        @font-face { font-family: "SF Pro Text"; src: url("/static/fonts/SF-Pro-Text-Medium.woff2") format("woff2"); font-weight: 500; font-display: swap; }
        @font-face { font-family: "SF Pro Text"; src: url("/static/fonts/SF-Pro-Text-Semibold.woff2") format("woff2"); font-weight: 600; font-display: swap; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #1A1A1A; --slate: #64748B; --mist: #94A3B8; --cloud: #F1F5F9;
            --snow: #FAFBFC; --white: #FFFFFF; --danger: #DC2626;
            --font-d: "SF Pro Display", -apple-system, sans-serif;
            --font-b: "SF Pro Text", -apple-system, sans-serif;
        }

        body { font-family: var(--font-b); background: var(--snow); color: var(--ink); min-height: 100vh; display: flex; -webkit-font-smoothing: antialiased; }

        .layout { display: flex; min-height: 100vh; width: 100%; }

        /* Brand */
        .brand { flex: 0 0 45%; background: var(--ink); display: flex; flex-direction: column; justify-content: space-between; padding: 48px; position: relative; overflow: hidden; }
        .brand::after { content: ''; position: absolute; top: -20%; right: -30%; width: 80%; height: 140%; background: radial-gradient(ellipse, rgba(255,255,255,0.04), transparent 70%); pointer-events: none; }
        .brand-logo { display: flex; align-items: center; gap: 12px; z-index: 1; }
        .brand-logo-icon { width: 40px; height: 40px; position: relative; }
        .brand-logo-icon .w { position: absolute; border: 2px solid #fff; border-radius: 50%; }
        .brand-logo-icon .w:nth-child(1) { width: 16px; height: 16px; top: 12px; left: 12px; opacity: .9; background: #fff; }
        .brand-logo-icon .w:nth-child(2) { width: 26px; height: 26px; top: 7px; left: 7px; opacity: .5; }
        .brand-logo-icon .w:nth-child(3) { width: 36px; height: 36px; top: 2px; left: 2px; opacity: .25; }
        .brand-logo-text { font-family: var(--font-d); font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
        .brand-body { z-index: 1; max-width: 380px; }
        .brand-body h1 { font-family: var(--font-d); font-size: 36px; font-weight: 600; color: #fff; line-height: 1.2; letter-spacing: -0.5px; margin-bottom: 20px; }
        .brand-body h1 em { font-style: normal; }
        .brand-body p { font-size: 15px; color: var(--mist); line-height: 1.7; }
        .brand-footer { z-index: 1; font-size: 12px; color: var(--slate); }

        /* Form */
        .form-side { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px; }
        .form-box { width: 100%; max-width: 400px; }
        .form-box h2 { font-family: var(--font-d); font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
        .form-box .sub { font-size: 14px; color: var(--slate); margin-bottom: 32px; }
        .form-box .sub a { color: var(--ink); text-decoration: none; font-weight: 500; }
        .form-box .sub a:hover { text-decoration: underline; }

        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 13px; font-weight: 500; color: #2D2D2D; margin-bottom: 6px; }
        .field input { width: 100%; height: 44px; padding: 0 14px; border: 1px solid #E2E8F0; border-radius: 8px; font-size: 14px; font-family: var(--font-b); color: var(--ink); background: var(--white); outline: none; transition: border-color .15s; }
        .field input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }

        .submit { width: 100%; height: 44px; border: none; border-radius: 8px; background: var(--ink); color: #fff; font-size: 14px; font-weight: 600; font-family: var(--font-b); cursor: pointer; transition: opacity .15s; margin-top: 4px; }
        .submit:hover { opacity: .85; }
        .submit:disabled { opacity: .5; cursor: not-allowed; }

        .error { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--danger); margin-bottom: 16px; display: none; }
        .error.show { display: block; }

        .footer-text { text-align: center; font-size: 12px; color: var(--mist); margin-top: 24px; }

        /* Mobile logo */
        .m-logo { display: none; align-items: center; gap: 10px; margin-bottom: 32px; }
        .m-logo-icon { width: 32px; height: 32px; position: relative; }
        .m-logo-icon .w { position: absolute; border: 2px solid var(--ink); border-radius: 50%; }
        .m-logo-icon .w:nth-child(1) { width: 12px; height: 12px; top: 10px; left: 10px; opacity: .9; background: var(--ink); }
        .m-logo-icon .w:nth-child(2) { width: 22px; height: 22px; top: 5px; left: 5px; opacity: .4; }
        .m-logo-icon .w:nth-child(3) { width: 30px; height: 30px; top: 1px; left: 1px; opacity: .2; }
        .m-logo-text { font-family: var(--font-d); font-size: 22px; font-weight: 700; }

        @media (max-width: 900px) {
            .brand { display: none; }
            .form-side { padding: 32px 24px; }
            .m-logo { display: flex; }
        }
    </style>
</head>
<body>
<div class="layout">
    <div class="brand">
        <div class="brand-logo">
            <div class="brand-logo-icon"><div class="w"></div><div class="w"></div><div class="w"></div></div>
            <div class="brand-logo-text">echo.</div>
        </div>
        <div class="brand-body">
            <h1>Seus documentos<br>ganham <em>voz</em></h1>
            <p>Transforme qualquer PDF em audiobook com voz AI natural. Leia mais, em menos tempo, sem esforço.</p>
        </div>
        <div class="brand-footer">hovio.com.br</div>
    </div>

    <div class="form-side">
        <div class="form-box">
            <div class="m-logo">
                <div class="m-logo-icon"><div class="w"></div><div class="w"></div><div class="w"></div></div>
                <div class="m-logo-text">echo.</div>
            </div>

            <h2>Entrar</h2>
            <p class="sub">Não tem conta? <a href="/register">Criar conta</a></p>

            <div class="error" id="err"></div>

            <form id="loginForm">
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                </div>
                <div class="field">
                    <label>Senha</label>
                    <input type="password" id="password" placeholder="Sua senha" required autocomplete="current-password">
                </div>
                <button class="submit" type="submit" id="btn">Entrar</button>
            </form>

            <p class="footer-text">Seus documentos ficam seguros e privados.</p>
        </div>
    </div>
</div>

<script>
// Se já logado, pular direto
if (localStorage.getItem('echo_token')) window.location.href = '/app';

document.getElementById('loginForm').onsubmit = async function(e) {
    e.preventDefault();
    var btn = document.getElementById('btn');
    var err = document.getElementById('err');
    err.className = 'error';
    btn.disabled = true;
    btn.textContent = 'Entrando...';

    try {
        var r = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            })
        });
        var d = await r.json();
        if (!r.ok) throw new Error(d.detail || 'Email ou senha incorretos');
        localStorage.setItem('echo_token', d.token);
        window.location.href = '/app';
    } catch (ex) {
        err.textContent = ex.message;
        err.className = 'error show';
        btn.disabled = false;
        btn.textContent = 'Entrar';
    }
};
</script>
</body>
</html>
