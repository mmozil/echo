<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo — Seus documentos ganham voz</title>
    <style>
        :root {
            --bg: #FAFAFA;
            --surface: #FFFFFF;
            --surface-hover: #F5F5F5;
            --border: #E8E8E8;
            --text: #1A1A1A;
            --text-secondary: #6B6B6B;
            --text-muted: #999;
            --accent: #003083;
            --accent-light: #E8EFF9;
            --accent-hover: #002266;
            --danger: #D93025;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: "SF Mono", "Cascadia Code", "Fira Code", monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Header --- */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg { width: 18px; height: 18px; }

        .logo span { color: var(--accent); }

        .header-actions { display: flex; gap: 8px; }

        /* --- Buttons --- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            font-family: var(--font);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--surface-hover); }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--border);
        }
        .btn-danger:hover { background: #fef2f2; }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-icon:hover { background: var(--surface-hover); }

        /* --- Main layout --- */
        .main {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* --- Library view --- */
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 24px;
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            background: var(--accent-light);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .empty-icon svg { width: 28px; height: 28px; color: var(--accent); }

        .empty-state h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        /* --- Document grid --- */
        .doc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .doc-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .doc-card:hover {
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .doc-card-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 16px;
        }

        .doc-cover {
            width: 44px;
            height: 56px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .doc-cover svg { width: 20px; height: 20px; color: white; opacity: 0.9; }

        .doc-info { flex: 1; min-width: 0; }

        .doc-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .doc-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
        }

        .doc-progress-bar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .doc-progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s;
        }

        .doc-delete {
            position: absolute;
            top: 12px;
            right: 12px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .doc-card:hover .doc-delete { opacity: 1; }

        /* --- Upload area --- */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 48px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 32px;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .upload-area.uploading {
            pointer-events: none;
            opacity: 0.7;
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }

        .upload-icon svg { width: 22px; height: 22px; color: var(--accent); }

        .upload-area h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .upload-area p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* --- Player view --- */
        .player-view { display: none; }
        .player-view.active { display: block; }
        .library-view.hidden { display: none; }

        .player-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            margin-bottom: 24px;
            padding: 6px 0;
        }
        .player-back:hover { color: var(--text); }

        .player-header {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 32px;
        }

        .player-cover {
            width: 80px;
            height: 100px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .player-cover svg { width: 36px; height: 36px; color: white; opacity: 0.9; }

        .player-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .player-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* --- Audio controls --- */
        .player-controls {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
        }

        .controls-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .play-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .play-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
        .play-btn svg { width: 24px; height: 24px; }

        .skip-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .skip-btn:hover { background: var(--surface-hover); color: var(--text); }
        .skip-btn svg { width: 18px; height: 18px; }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-time {
            font-size: 12px;
            font-family: var(--font-mono);
            color: var(--text-muted);
            min-width: 52px;
        }

        .progress-time.right { text-align: right; }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar:hover { height: 6px; }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        .controls-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
        }

        .chunk-info {
            font-size: 12px;
            color: var(--text-muted);
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .speed-btn {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: var(--font-mono);
            transition: all 0.15s;
        }
        .speed-btn:hover, .speed-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* --- Text display --- */
        .text-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.8;
            font-size: 16px;
            color: var(--text);
        }

        .text-panel p {
            margin-bottom: 16px;
        }

        .text-panel .highlight {
            background: var(--accent-light);
            border-radius: 2px;
            padding: 1px 2px;
        }

        /* --- Chapters list --- */
        .chapters-title {
            font-size: 14px;
            font-weight: 600;
            margin: 24px 0 12px;
        }

        .chapters-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .chapter-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.15s;
            font-size: 14px;
        }

        .chapter-item:hover { background: var(--surface-hover); }
        .chapter-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
        .chapter-item.played { color: var(--text-muted); }

        .chapter-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .chapter-item.active .chapter-num {
            background: var(--accent);
            color: white;
        }

        .chapter-page {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* --- Loading --- */
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--text);
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* --- Responsive --- */
        @media (max-width: 640px) {
            .header { padding: 12px 16px; }
            .main { padding: 20px 16px; }
            .doc-grid { grid-template-columns: 1fr; }
            .upload-area { padding: 32px 20px; }
            .player-title { font-size: 20px; }
            .text-panel { padding: 20px; font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
            </svg>
        </div>
        echo<span>.</span>
    </div>
    <div class="header-actions">
        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Upload PDF
        </button>
    </div>
</div>

<input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="handleFileUpload(this.files[0])">

<div class="main">
    <!-- Library View -->
    <div class="library-view" id="libraryView">
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </div>
            <h3>Arraste um PDF ou clique para enviar</h3>
            <p>Seus documentos serão lidos pela voz do Antonio</p>
        </div>

        <div id="docList"></div>
    </div>

    <!-- Player View -->
    <div class="player-view" id="playerView">
        <div class="player-back" onclick="showLibrary()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            Biblioteca
        </div>

        <div class="player-header">
            <div class="player-cover" id="playerCover">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            </div>
            <div>
                <div class="player-title" id="playerTitle">—</div>
                <div class="player-subtitle" id="playerSubtitle">—</div>
            </div>
        </div>

        <div class="player-controls">
            <div class="controls-top">
                <button class="skip-btn" onclick="prevChunk()" title="Anterior">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="play-btn" id="playBtn" onclick="togglePlay()">
                    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                <button class="skip-btn" onclick="nextChunk()" title="Próximo">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-10 0l8.5 6L6 18z"/></svg>
                </button>
            </div>

            <div class="progress-container">
                <span class="progress-time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar" onclick="seekAudio(event)">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
                <span class="progress-time right" id="totalTime">0:00</span>
            </div>

            <div class="controls-bottom">
                <span class="chunk-info" id="chunkInfo">— de —</span>
                <div class="speed-control">
                    <button class="speed-btn" onclick="setSpeed(0.75)">0.75×</button>
                    <button class="speed-btn active" onclick="setSpeed(1)">1×</button>
                    <button class="speed-btn" onclick="setSpeed(1.25)">1.25×</button>
                    <button class="speed-btn" onclick="setSpeed(1.5)">1.5×</button>
                    <button class="speed-btn" onclick="setSpeed(2)">2×</button>
                </div>
            </div>
        </div>

        <div class="text-panel" id="textPanel">
            <p style="color: var(--text-muted)">Pressione play para iniciar a leitura...</p>
        </div>

        <div class="chapters-title">Trechos</div>
        <div class="chapters-list" id="chaptersList"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<audio id="audioPlayer"></audio>

<script>
// --- State ---
let currentDoc = null;
let currentChunks = [];
let currentChunkIndex = 0;
let isPlaying = false;
let currentSpeed = 1;
const audio = document.getElementById('audioPlayer');

// --- Init ---
loadDocuments();
setupDragDrop();

// --- Drag & Drop ---
function setupDragDrop() {
    const area = document.getElementById('uploadArea');
    ['dragenter', 'dragover'].forEach(e => {
        area.addEventListener(e, ev => { ev.preventDefault(); area.classList.add('dragover'); });
    });
    ['dragleave', 'drop'].forEach(e => {
        area.addEventListener(e, ev => { ev.preventDefault(); area.classList.remove('dragover'); });
    });
    area.addEventListener('drop', ev => {
        const file = ev.dataTransfer.files[0];
        if (file && file.type === 'application/pdf') handleFileUpload(file);
    });
}

// --- Upload ---
async function handleFileUpload(file) {
    if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
        showToast('Apenas arquivos PDF são aceitos');
        return;
    }

    const area = document.getElementById('uploadArea');
    area.classList.add('uploading');
    area.innerHTML = '<div class="loading-spinner" style="margin:0 auto"></div><h3 style="margin-top:12px">Processando...</h3><p>Extraindo texto do PDF</p>';

    const formData = new FormData();
    formData.append('file', file);

    try {
        const res = await fetch('/api/documents', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Erro no upload');
        showToast(`"${data.title}" adicionado — ${data.total_chunks} trechos`);
        loadDocuments();
    } catch (err) {
        showToast(err.message);
    } finally {
        area.classList.remove('uploading');
        area.innerHTML = `
            <div class="upload-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
            <h3>Arraste um PDF ou clique para enviar</h3>
            <p>Seus documentos serão lidos pela voz do Antonio</p>`;
    }
    document.getElementById('fileInput').value = '';
}

// --- Documents ---
async function loadDocuments() {
    try {
        const res = await fetch('/api/documents');
        const data = await res.json();
        renderDocuments(data.documents);
    } catch (err) {
        console.error('Erro ao carregar documentos:', err);
    }
}

function renderDocuments(docs) {
    const container = document.getElementById('docList');
    if (!docs.length) {
        container.innerHTML = '';
        return;
    }

    container.innerHTML = `
        <div class="section-title">Sua biblioteca</div>
        <div class="doc-grid">
            ${docs.map(doc => {
                const progress = doc.total_chunks > 0 ? ((doc.current_chunk || 0) / doc.total_chunks * 100) : 0;
                const size = doc.file_size > 1048576 ? (doc.file_size / 1048576).toFixed(1) + ' MB' : Math.round(doc.file_size / 1024) + ' KB';
                return `
                <div class="doc-card" onclick="openDocument('${doc.id}')">
                    <button class="btn-icon doc-delete" onclick="event.stopPropagation(); deleteDoc('${doc.id}', '${doc.title.replace(/'/g, "\\'")}')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                    <div class="doc-card-header">
                        <div class="doc-cover" style="background:${doc.cover_color}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                        </div>
                        <div class="doc-info">
                            <div class="doc-title">${doc.title}</div>
                            <div class="doc-meta">
                                <span>${doc.total_pages} pág.</span>
                                <span>${doc.total_chunks} trechos</span>
                                <span>${size}</span>
                            </div>
                        </div>
                    </div>
                    <div class="doc-progress-bar">
                        <div class="doc-progress-fill" style="width:${progress}%"></div>
                    </div>
                </div>`;
            }).join('')}
        </div>`;
}

async function deleteDoc(id, title) {
    if (!confirm(`Remover "${title}"?`)) return;
    try {
        await fetch(`/api/documents/${id}`, { method: 'DELETE' });
        showToast('Documento removido');
        loadDocuments();
    } catch (err) {
        showToast('Erro ao remover');
    }
}

// --- Open document (player) ---
async function openDocument(docId) {
    try {
        const res = await fetch(`/api/documents/${docId}`);
        const data = await res.json();

        currentDoc = data.document;
        currentChunks = data.chunks;
        currentChunkIndex = data.progress?.current_chunk || 0;

        // Update UI
        document.getElementById('playerTitle').textContent = currentDoc.title;
        document.getElementById('playerSubtitle').textContent = `${currentDoc.total_pages} páginas · ${currentDoc.total_chunks} trechos`;
        document.getElementById('playerCover').style.background = currentDoc.cover_color;
        document.getElementById('chunkInfo').textContent = `${currentChunkIndex + 1} de ${currentChunks.length}`;

        // Render chapters
        renderChapters();

        // Show player
        document.getElementById('libraryView').classList.add('hidden');
        document.getElementById('playerView').classList.add('active');

        // Load text
        await loadChunkText(currentChunkIndex);
    } catch (err) {
        showToast('Erro ao abrir documento');
        console.error(err);
    }
}

function showLibrary() {
    stopAudio();
    document.getElementById('playerView').classList.remove('active');
    document.getElementById('libraryView').classList.remove('hidden');
    loadDocuments();
}

function renderChapters() {
    const list = document.getElementById('chaptersList');
    list.innerHTML = currentChunks.map((c, i) => `
        <div class="chapter-item ${i === currentChunkIndex ? 'active' : ''} ${i < currentChunkIndex ? 'played' : ''}" onclick="goToChunk(${i})">
            <div class="chapter-num">${i + 1}</div>
            <span>${c.text}</span>
            <span class="chapter-page">p. ${c.page}</span>
        </div>
    `).join('');
}

// --- Audio playback ---
async function togglePlay() {
    if (isPlaying) {
        pauseAudio();
    } else {
        await playCurrentChunk();
    }
}

async function playCurrentChunk() {
    if (!currentDoc) return;

    // Generate audio for current chunk
    showPlayLoading(true);

    try {
        const res = await fetch(`/api/documents/${currentDoc.id}/chunks/${currentChunkIndex}/audio`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Erro ao gerar áudio');

        audio.src = data.audio_url;
        audio.playbackRate = currentSpeed;
        await audio.play();

        isPlaying = true;
        updatePlayButton();
        showPlayLoading(false);

        // Save progress
        fetch(`/api/documents/${currentDoc.id}/progress?current_chunk=${currentChunkIndex}`, { method: 'PUT' });
    } catch (err) {
        showPlayLoading(false);
        showToast('Erro ao gerar áudio: ' + err.message);
        console.error(err);
    }
}

function pauseAudio() {
    audio.pause();
    isPlaying = false;
    updatePlayButton();
}

function stopAudio() {
    audio.pause();
    audio.src = '';
    isPlaying = false;
    updatePlayButton();
}

function updatePlayButton() {
    document.getElementById('playIcon').style.display = isPlaying ? 'none' : 'block';
    document.getElementById('pauseIcon').style.display = isPlaying ? 'block' : 'none';
}

function showPlayLoading(loading) {
    const btn = document.getElementById('playBtn');
    if (loading) {
        btn.innerHTML = '<div class="loading-spinner" style="border-top-color:white;border-color:rgba(255,255,255,0.3)"></div>';
    } else {
        btn.innerHTML = `
            <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" style="display:${isPlaying ? 'none' : 'block'}"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:${isPlaying ? 'block' : 'none'}"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
    }
}

// Audio events
audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
        document.getElementById('totalTime').textContent = formatTime(audio.duration);
    }
});

audio.addEventListener('ended', () => {
    // Auto-advance to next chunk
    if (currentChunkIndex < currentChunks.length - 1) {
        nextChunk();
    } else {
        isPlaying = false;
        updatePlayButton();
        showToast('Leitura concluída!');
    }
});

function seekAudio(event) {
    if (!audio.duration) return;
    const bar = document.getElementById('progressBar');
    const rect = bar.getBoundingClientRect();
    const pct = (event.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
}

function setSpeed(speed) {
    currentSpeed = speed;
    audio.playbackRate = speed;
    document.querySelectorAll('.speed-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim() === speed + '×');
    });
}

async function nextChunk() {
    if (currentChunkIndex < currentChunks.length - 1) {
        currentChunkIndex++;
        updateChunkUI();
        if (isPlaying) await playCurrentChunk();
    }
}

async function prevChunk() {
    if (currentChunkIndex > 0) {
        currentChunkIndex--;
        updateChunkUI();
        if (isPlaying) await playCurrentChunk();
    }
}

async function goToChunk(index) {
    currentChunkIndex = index;
    updateChunkUI();
    await playCurrentChunk();
}

function updateChunkUI() {
    document.getElementById('chunkInfo').textContent = `${currentChunkIndex + 1} de ${currentChunks.length}`;
    renderChapters();
    loadChunkText(currentChunkIndex);
}

async function loadChunkText(index) {
    try {
        const res = await fetch(`/api/documents/${currentDoc.id}/chunks/${index}/text`);
        const data = await res.json();
        const paragraphs = data.text.split('\n\n').filter(p => p.trim());
        document.getElementById('textPanel').innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');
    } catch (err) {
        console.error('Erro ao carregar texto:', err);
    }
}

// --- Helpers ---
function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
}

function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
